<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawGram X Update</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 450px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* Neon animated background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 450px;
    background: linear-gradient(120deg, #22c55e, #06b6d4, #6366f1, #22c55e);
    animation: bgMove 12s linear infinite;
    opacity: 0.15;
}

@keyframes bgMove {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

/* Glass card */
.dialog {
    width: 340px;
    height: 400px;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(34,197,94,0.25);
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: center;
    color: white;
    position: relative;
    animation: pop 0.6s ease;
}

@keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Glow icon */
.icon {
    font-size: 52px;
    text-shadow: 0 0 15px #22c55e, 0 0 25px #22c55e;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

/* Bold Title */
.title {
    font-size: 28px;
    font-weight: 800;
    margin-top: 6px;
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Subtitle */
.subtitle {
    font-size: 14px;
    color: #cbd5f5;
    margin-top: 4px;
}

/* Changelog */
.changelog {
    text-align: left;
    font-size: 14px;
    margin: 12px 0;
}

.changelog span {
    display: block;
    margin: 6px 0;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.6s forwards;
}

.changelog span:nth-child(1) { animation-delay: 0.2s; }
.changelog span:nth-child(2) { animation-delay: 0.3s; }
.changelog span:nth-child(3) { animation-delay: 0.4s; }
.changelog span:nth-child(4) { animation-delay: 0.5s; }

@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

/* Neon Button */
.button {
    text-decoration: none;
    padding: 14px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    color: black;
    box-shadow: 0 0 15px #22c55e, 0 0 25px #06b6d4;
    transition: 0.25s;
}

.button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px #22c55e, 0 0 45px #06b6d4;
}

/* Footer */
.footer {
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="dialog">
    <div>
        <div class="icon">⚡</div>
        <div class="title">PawGram X v4</div>
        <div class="subtitle">Update Available</div>
    </div>

    <div class="changelog">
        <span>👻 Next-gen Ghost Mode</span>
        <span>🚫 Stronger Ad Blocking</span>
        <span>📥 Faster Media Downloads</span>
        <span>⚙️ Smoother UI + Performance</span>
    </div>

    <a class="button" href="https://t.me/pawgramapp" target="_blank">
        UPDATE NOW 🚀
    </a>

    <div class="footer">
        FAST • CLEAN • PRIVATE
    </div>
</div>

</body>
</html>
